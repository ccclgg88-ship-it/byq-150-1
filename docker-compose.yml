version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hr_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: hr_system
      MYSQL_USER: hr_user
      MYSQL_PASSWORD: hr_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hr-network

  backend:
    build: ./backend
    container_name: hr_backend
    restart: always
    ports:
      - "8001:8001"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=hr_user
      - DB_PASSWORD=hr_password
      - DB_NAME=hr_system
      - PORT=8001
    depends_on:
      - mysql
    networks:
      - hr-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: hr_frontend
    restart: always
    ports:
      - "3007:80"
    depends_on:
      - backend
    networks:
      - hr-network

volumes:
  mysql_data:

networks:
  hr-network:
    driver: bridge
